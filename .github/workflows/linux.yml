name: Build (Linux)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test Linux targets
        # linuxX64 runs natively on ubuntu-latest; linuxArm64 cross-compiles
        # on x64 hosts (no test execution — needs an arm64 runner or qemu).
        run: >
          ./gradlew
          compileKotlinLinuxX64
          compileKotlinLinuxArm64
          linuxX64Test
          --no-configuration-cache

      - name: Upload test reports (Linux)
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-linux
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7
          if-no-files-found: warn
