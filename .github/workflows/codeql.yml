name: CodeQL

# Universal CodeQL config for KotlinMania repos.
#
# `actions` covers workflow files; `javascript-typescript` covers any JS/TS in
# the repo (browser-test scaffolding, etc.).
#
# `java-kotlin` runs in `manual` mode, building only `compileAndroidMain`. The
# `com.android.kotlin.multiplatform.library` plugin emits real JVM `.class`
# files under `build/classes/kotlin/android/main/`, which is what CodeQL's
# Kotlin extractor (LD_PRELOAD on JVM `kotlinc`) can ingest. Earlier attempts
# with `compileKotlinMetadata` failed because the metadata compiler emits
# `.knm` files via a different frontend the tracer doesn't hook.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.build-mode == 'manual'
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Compile Android Kotlin (JVM bytecode) for CodeQL extraction
        if: matrix.build-mode == 'manual'
        shell: bash
        # `compileAndroidMain` is the only KMP compilation in this repo that
        # emits JVM `.class` files (`com.android.kotlin.multiplatform.library`
        # plugin). That's what CodeQL's Kotlin extractor's LD_PRELOAD tracer
        # can hook.
        #
        # `--rerun-tasks` defeats Gradle's up-to-date check and any restored
        # build cache from setup-gradle, ensuring kotlinc is actually invoked.
        #
        # `kotlin.compiler.execution.strategy=out-of-process` spawns a fresh
        # kotlinc JVM per compilation (instead of the long-lived `daemon`
        # default or function-call `in-process` mode). The tracer hooks new
        # process invocations, so out-of-process gives it a process exec to
        # intercept.
        run: |
          ./gradlew compileAndroidMain \
            --rerun-tasks \
            -Pkotlin.compiler.execution.strategy=out-of-process \
            --no-configuration-cache \
            --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
